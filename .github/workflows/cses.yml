name: Update CSES Badge

on:
  schedule:
    - cron: "0 */12 * * *"  
  workflow_dispatch:      

jobs:
  update-cses:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y python3 python3-pip
        pip3 install beautifulsoup4 requests

    - name: Run scraper
      run: python3 cses_scraper.py

    - name: Commit changes
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git add generated/cses_solved.svg
        git commit -m "Update CSES solved badge" || echo "No changes"
        git push
