<svg width="420" height="190" viewBox="0 0 420 190"
     xmlns="http://www.w3.org/2000/svg" role="img"
     aria-label="CSES Stats for ThomasBA">
  <title>CSES Stats – ThomasBA</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c9373c"/>
      <stop offset="100%" stop-color="#ff6b6b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c9373c" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#c9373c" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="round"><rect width="420" height="190" rx="12"/></clipPath>
  </defs>

  <!-- Background -->
  <rect width="420" height="190" rx="12" fill="url(#bg)" clip-path="url(#round)"/>
  <rect width="140" height="190" fill="url(#accent)" clip-path="url(#round)"/>

  <!-- Red left border -->
  <rect width="3" height="190" rx="2" fill="#c9373c"/>

  <!-- Header -->
  <text x="20" y="34" font-family="JetBrains Mono,monospace" font-size="13"
        fill="#c9373c" font-weight="700" letter-spacing="2">CSES PROBLEM SET</text>
  <text x="20" y="56" font-family="JetBrains Mono,monospace" font-size="18"
        fill="#e6edf3" font-weight="700">ThomasBA</text>

  <!-- Divider -->
  <line x1="20" y1="68" x2="400" y2="68" stroke="#30363d" stroke-width="1"/>

  <!-- Stats row -->
  <text x="20"  y="92" font-family="JetBrains Mono,monospace" font-size="10" fill="#8b949e">SOLVED</text>
  <text x="130" y="92" font-family="JetBrains Mono,monospace" font-size="10" fill="#8b949e">SUBMISSIONS</text>
  <text x="280" y="92" font-family="JetBrains Mono,monospace" font-size="10" fill="#8b949e">LAST ACTIVE</text>

  <text x="20"  y="112" font-family="JetBrains Mono,monospace" font-size="22" fill="#e6edf3" font-weight="700">0<tspan font-size="12" fill="#8b949e">/300</tspan></text>
  <text x="130" y="112" font-family="JetBrains Mono,monospace" font-size="22" fill="#e6edf3" font-weight="700">9</text>
  <text x="280" y="112" font-family="JetBrains Mono,monospace" font-size="13" fill="#c9d1d9">2026-05-09</text>

  <!-- Progress bar track -->
  <rect x="20" y="130" width="380" height="8" rx="4" fill="#21262d"/>
  <!-- Progress bar fill -->
  <rect x="20" y="130" width="0" height="8" rx="4" fill="url(#bar)">
    <animate attributeName="width" from="0" to="0" dur="1.2s" fill="freeze" calcMode="spline"
             keySplines="0.4 0 0.2 1" keyTimes="0;1"/>
  </rect>

  <!-- Percentage label -->
  <text x="20" y="158" font-family="JetBrains Mono,monospace" font-size="11" fill="#c9373c" font-weight="600">0% complete</text>
  <text x="390" y="158" font-family="JetBrains Mono,monospace" font-size="10" fill="#484f58" text-anchor="end">since 2026-04-08</text>

  <!-- Footer -->
  <text x="20" y="180" font-family="JetBrains Mono,monospace" font-size="9" fill="#484f58">updated 2026-05-24 UTC · cses.fi/user/416103</text>
</svg>