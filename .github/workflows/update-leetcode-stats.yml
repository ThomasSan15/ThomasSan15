name: Update LeetCode Stats

on:
  schedule:
    - cron: "0 8 * * *"   # daily 08:00 UTC
  workflow_dispatch:

jobs:
  update-leetcode:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests

      - name: Generate SVGs
        run: |
          python scripts/generate_leetcode_stats.py \
            --user ThomasBA \
            --out generated

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add generated/leetcode_overview.svg \
                  generated/leetcode_difficulty.svg \
                  generated/leetcode_topics.svg
          git diff --staged --quiet && echo "No changes." || (
            git commit -m "chore: update LeetCode stats [skip ci]"
            git push
          )
