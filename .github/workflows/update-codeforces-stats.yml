name: Update Codeforces Stats

on:
  schedule:
    - cron: "0 7 * * *"   # daily at 07:00 UTC
  workflow_dispatch:

jobs:
  update-codeforces:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Generate Codeforces SVG cards
        run: |
          python scripts/generate_codeforces_stats.py \
            --user ThomasBA \
            --out generated

      - name: Commit and push SVGs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add generated/codeforces_overview.svg \
                  generated/codeforces_tags.svg
          git diff --staged --quiet && echo "No changes." || (
            git commit -m "chore: update Codeforces stats [skip ci]"
            git push
          )
