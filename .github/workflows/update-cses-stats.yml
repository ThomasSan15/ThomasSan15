name: Update CSES Stats

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  update-cses-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      CSES_SESSION: ${{ secrets.CSES_SESSION }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Generate CSES Stats SVGs
        run: |
          python scripts/generate_cses_stats.py \
            --user 416103 \
            --username ThomasBA \
            --out generated

      - name: Commit and push SVGs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add generated/cses_overview.svg \
                  generated/cses_categories.svg \
                  generated/cses_languages.svg \
                  generated/cses_solved.svg
          git diff --staged --quiet && echo "Sin cambios." || (
            git commit -m "chore: update CSES stats [skip ci]"
            git push
          )
