<svg width="420" height="296" viewBox="0 0 420 296"
     xmlns="http://www.w3.org/2000/svg" role="img"
     aria-label="CSES Category Progress">
  <title>CSES Category Progress</title>
  <defs>
    <clipPath id="round2"><rect width="420" height="296" rx="12"/></clipPath>
  </defs>

  <!-- Background -->
  <rect width="420" height="296" rx="12" fill="#0d1117" clip-path="url(#round2)"/>
  <rect width="3" height="296" rx="2" fill="#c9373c"/>

  <!-- Header -->
  <text x="16" y="26" font-family="JetBrains Mono,monospace" font-size="11"
        fill="#c9373c" font-weight="700" letter-spacing="2">CATEGORY PROGRESS</text>
  <line x1="16" y1="36" x2="404" y2="36" stroke="#21262d" stroke-width="1"/>

  
  <!-- Introductory Problems -->
  <text x="16" y="68" font-family="JetBrains Mono,monospace" font-size="11"
        fill="#c9d1d9">Introductory</text>
  <rect x="110" y="59" width="240" height="10" rx="5" fill="#21262d"/>
  <rect x="110" y="59" width="0" height="10" rx="5" fill="#c9373c" opacity="0.9">
    <animate attributeName="width" from="0" to="0" dur="1.00s" fill="freeze"
             calcMode="spline" keySplines="0.4 0 0.2 1" keyTimes="0;1"/>
  </rect>
  <text x="358" y="68" font-family="JetBrains Mono,monospace"
        font-size="10" fill="#8b949e">0/19</text>
  <!-- Sorting and Searching -->
  <text x="16" y="96" font-family="JetBrains Mono,monospace" font-size="11"
        fill="#c9d1d9">Sorting</text>
  <rect x="110" y="87" width="240" height="10" rx="5" fill="#21262d"/>
  <rect x="110" y="87" width="0" height="10" rx="5" fill="#c9373c" opacity="0.9">
    <animate attributeName="width" from="0" to="0" dur="1.08s" fill="freeze"
             calcMode="spline" keySplines="0.4 0 0.2 1" keyTimes="0;1"/>
  </rect>
  <text x="358" y="96" font-family="JetBrains Mono,monospace"
        font-size="10" fill="#8b949e">0/35</text>
  <!-- Dynamic Programming -->
  <text x="16" y="124" font-family="JetBrains Mono,monospace" font-size="11"
        fill="#c9d1d9">DP</text>
  <rect x="110" y="115" width="240" height="10" rx="5" fill="#21262d"/>
  <rect x="110" y="115" width="0" height="10" rx="5" fill="#c9373c" opacity="0.9">
    <animate attributeName="width" from="0" to="0" dur="1.16s" fill="freeze"
             calcMode="spline" keySplines="0.4 0 0.2 1" keyTimes="0;1"/>
  </rect>
  <text x="358" y="124" font-family="JetBrains Mono,monospace"
        font-size="10" fill="#8b949e">0/19</text>
  <!-- Graph Algorithms -->
  <text x="16" y="152" font-family="JetBrains Mono,monospace" font-size="11"
        fill="#c9d1d9">Graphs</text>
  <rect x="110" y="143" width="240" height="10" rx="5" fill="#21262d"/>
  <rect x="110" y="143" width="0" height="10" rx="5" fill="#c9373c" opacity="0.9">
    <animate attributeName="width" from="0" to="0" dur="1.24s" fill="freeze"
             calcMode="spline" keySplines="0.4 0 0.2 1" keyTimes="0;1"/>
  </rect>
  <text x="358" y="152" font-family="JetBrains Mono,monospace"
        font-size="10" fill="#8b949e">0/36</text>
  <!-- Range Queries -->
  <text x="16" y="180" font-family="JetBrains Mono,monospace" font-size="11"
        fill="#c9d1d9">Range Queries</text>
  <rect x="110" y="171" width="240" height="10" rx="5" fill="#21262d"/>
  <rect x="110" y="171" width="0" height="10" rx="5" fill="#c9373c" opacity="0.9">
    <animate attributeName="width" from="0" to="0" dur="1.32s" fill="freeze"
             calcMode="spline" keySplines="0.4 0 0.2 1" keyTimes="0;1"/>
  </rect>
  <text x="358" y="180" font-family="JetBrains Mono,monospace"
        font-size="10" fill="#8b949e">0/19</text>
  <!-- Tree Algorithms -->
  <text x="16" y="208" font-family="JetBrains Mono,monospace" font-size="11"
        fill="#c9d1d9">Trees</text>
  <rect x="110" y="199" width="240" height="10" rx="5" fill="#21262d"/>
  <rect x="110" y="199" width="0" height="10" rx="5" fill="#c9373c" opacity="0.9">
    <animate attributeName="width" from="0" to="0" dur="1.40s" fill="freeze"
             calcMode="spline" keySplines="0.4 0 0.2 1" keyTimes="0;1"/>
  </rect>
  <text x="358" y="208" font-family="JetBrains Mono,monospace"
        font-size="10" fill="#8b949e">0/16</text>
  <!-- Mathematics -->
  <text x="16" y="236" font-family="JetBrains Mono,monospace" font-size="11"
        fill="#c9d1d9">Math</text>
  <rect x="110" y="227" width="240" height="10" rx="5" fill="#21262d"/>
  <rect x="110" y="227" width="0" height="10" rx="5" fill="#c9373c" opacity="0.9">
    <animate attributeName="width" from="0" to="0" dur="1.48s" fill="freeze"
             calcMode="spline" keySplines="0.4 0 0.2 1" keyTimes="0;1"/>
  </rect>
  <text x="358" y="236" font-family="JetBrains Mono,monospace"
        font-size="10" fill="#8b949e">0/31</text>
  <!-- String Algorithms -->
  <text x="16" y="264" font-family="JetBrains Mono,monospace" font-size="11"
        fill="#c9d1d9">Strings</text>
  <rect x="110" y="255" width="240" height="10" rx="5" fill="#21262d"/>
  <rect x="110" y="255" width="0" height="10" rx="5" fill="#c9373c" opacity="0.9">
    <animate attributeName="width" from="0" to="0" dur="1.56s" fill="freeze"
             calcMode="spline" keySplines="0.4 0 0.2 1" keyTimes="0;1"/>
  </rect>
  <text x="358" y="264" font-family="JetBrains Mono,monospace"
        font-size="10" fill="#8b949e">0/17</text>
</svg>